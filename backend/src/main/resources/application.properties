spring.application.name=backend

# Endpoint del RDS Proxy (o RDS directo para la comparación "sin proxy").
# Ejemplo proxy host: bite-proxy.proxy-xxxx.us-east-1.rds.amazonaws.com
app.datasource.host=${APP_DATASOURCE_HOST:localhost}
app.datasource.port=${APP_DATASOURCE_PORT:5432}
app.datasource.database=${APP_DATASOURCE_DATABASE:backend_db}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${app.datasource.host}:${app.datasource.port}/${app.datasource.database}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backend_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP + RDS Proxy: minimiza overhead de conexiones por request.
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:3000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:60000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Health check del ALB
management.endpoints.web.exposure.include=health
